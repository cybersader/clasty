version: "3.9"

services:
  # Yjs WebSocket sync server
  yjs-server:
    image: node:20-alpine
    working_dir: /app
    command: npx y-websocket
    ports:
      - "1234:1234"
    environment:
      - HOST=0.0.0.0
      - PORT=1234
      - PERSISTENCE=./persistence
    volumes:
      - yjs-data:/app/persistence
    networks:
      - obsidian-net

  # MinIO for binary attachments (images, PDFs)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - obsidian-net

  # Obsidian container with sync daemon
  # For POC, we use linuxserver/obsidian directly
  # In production, use the custom Dockerfile
  obsidian:
    image: linuxserver/obsidian:latest
    ports:
      - "3000:3000"   # VNC web interface
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - obsidian-config:/config
      - ./vaults/demo:/config/vaults/demo  # Demo vault
    networks:
      - obsidian-net
    # Note: In production, the sync daemon runs inside this container.
    # For POC testing, you can run sync-daemon separately:
    # cd sync-daemon && npm start

  # Sync daemon (development mode - runs separately)
  sync-daemon:
    build:
      context: ./sync-daemon
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - SYNC_SERVER_URL=ws://yjs-server:1234
      - VAULT_PATH=/vaults
      - USER_ID=dev-user
    volumes:
      - ./vaults/demo:/vaults/demo
    networks:
      - obsidian-net
    depends_on:
      - yjs-server

networks:
  obsidian-net:
    driver: bridge

volumes:
  yjs-data:
  minio-data:
  obsidian-config:
